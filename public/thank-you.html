<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спасибо за заявку — СтеныПро</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/logo.jpg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .ty-card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,.08);
    }

    .ty-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #dcfce7;
      border: 3px solid #86efac;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      color: #16a34a;
    }

    .ty-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .ty-logo img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: cover;
    }
    .ty-logo-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: #111827;
      line-height: 1.1;
    }
    .ty-logo-title span { color: #2563eb; }

    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .ty-text {
      font-size: .95rem;
      color: #6b7280;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .ty-contacts {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
      background: #f8fafc;
      border-radius: 12px;
      padding: 20px 24px;
    }
    .ty-contacts a {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .9rem;
      color: #374151;
      text-decoration: none;
      font-weight: 500;
      transition: color .2s;
    }
    .ty-contacts a:hover { color: #2563eb; }
    .ty-contacts svg { color: #2563eb; flex-shrink: 0; }

    .ty-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #2563eb;
      color: #fff;
      padding: 14px 32px;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .ty-btn:hover { background: #1d4ed8; transform: translateY(-1px); color: #fff; }

    .ty-footer {
      margin-top: 28px;
      font-size: .78rem;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .ty-card { padding: 36px 24px; }
      h1 { font-size: 1.35rem; }
    }
  </style>
</head>
